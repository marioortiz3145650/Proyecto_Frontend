<div class="login-page">
  <div class="login-card">
    <div class="login-avatar">
      <i class="pi pi-user"></i>
    </div>

    <h1 class="login-title">Laying Hens</h1>
    <p class="login-subtitle">Sistema de Gestión de Gallinas Ponedoras</p>

    <div class="error-msg" *ngIf="errorMsg">
      <i class="pi pi-exclamation-circle"></i>
      {{ errorMsg }}
      <i class="pi pi-times error-close" (click)="errorMsg = ''"></i>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()" autocomplete="on">

      <div class="form-group">
        <label class="form-label">Usuario</label>
        <p-iconfield>
          <p-inputicon class="pi pi-user" />
          <input
            pInputText
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Ingresa tu usuario"
            autocomplete="username"
          />
        </p-iconfield>
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <p-iconfield>
          <p-inputicon class="pi pi-lock" />
          <input
            pInputText
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingresa tu contraseña"
            autocomplete="current-password"
          />
          <p-inputicon
            [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"
            (click)="showPassword = !showPassword"
          />
        </p-iconfield>
      </div>

      <button
        type="submit"
        class="login-btn w-full"
        [disabled]="loading"
      >
        <i class="pi pi-spin pi-spinner" *ngIf="loading"></i>
        <span *ngIf="!loading">INGRESAR</span>
      </button>

      <div class="divider">
        <span>o</span>
      </div>

      <button
        type="button"
        class="guest-btn w-full"
        [disabled]="guestLoading"
        (click)="loginAsGuest()"
      >
        <i class="pi pi-spin pi-spinner" *ngIf="guestLoading"></i>
        <i class="pi pi-eye mr-2" *ngIf="!guestLoading"></i>
        <span>Ingresar como Visitante</span>
      </button>

    </form>
  </div>
</div>
